<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 340" width="1200" height="340" fill="none" role="img" aria-label="NowAIKit — ServiceNow MCP Server. Connect any AI to ServiceNow. 450+ tools.">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="340" gradientUnits="userSpaceOnUse">
      <stop stop-color="#070B16"/>
      <stop offset="1" stop-color="#0B1020"/>
    </linearGradient>
    <radialGradient id="glowA" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(170 70) rotate(38) scale(560)">
      <stop stop-color="#00D4AA" stop-opacity="0.22"/>
      <stop offset="1" stop-color="#00D4AA" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowB" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(1120 320) rotate(-140) scale(420)">
      <stop stop-color="#0F4C81" stop-opacity="0.30"/>
      <stop offset="1" stop-color="#0F4C81" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="mark" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#00F0C0"/>
      <stop offset="0.5" stop-color="#00D4AA"/>
      <stop offset="1" stop-color="#0F4C81"/>
    </linearGradient>
    <linearGradient id="ai" x1="0" y1="0" x2="1" y2="0">
      <stop stop-color="#00F0C0"/>
      <stop offset="1" stop-color="#00B08E"/>
    </linearGradient>
  </defs>

  <!-- background + glows + hairline border -->
  <rect width="1200" height="340" rx="20" fill="url(#bg)"/>
  <rect width="1200" height="340" rx="20" fill="url(#glowA)"/>
  <rect width="1200" height="340" rx="20" fill="url(#glowB)"/>
  <rect x="0.75" y="0.75" width="1198.5" height="338.5" rx="19.25" stroke="#00D4AA" stroke-opacity="0.14"/>

  <!-- faint node graph (AI ↔ ServiceNow, decorative) -->
  <g stroke="#00D4AA" stroke-opacity="0.10" fill="#00D4AA" fill-opacity="0.18">
    <line x1="980" y1="80" x2="1060" y2="130"/><line x1="1060" y1="130" x2="1010" y2="210"/>
    <line x1="1010" y1="210" x2="1110" y2="245"/><line x1="1060" y1="130" x2="1130" y2="95"/>
    <circle cx="980" cy="80" r="5"/><circle cx="1060" cy="130" r="6"/><circle cx="1010" cy="210" r="5"/>
    <circle cx="1110" cy="245" r="4"/><circle cx="1130" cy="95" r="4"/>
  </g>

  <!-- logo mark: gradient rounded-square with the N + AI sparkle -->
  <g transform="translate(72 100)">
    <rect width="140" height="140" rx="35" fill="url(#mark)"/>
    <g transform="translate(70 70) scale(2.55) translate(-22 -23)">
      <path d="M5 39V7l15 27V7" stroke="#fff" stroke-width="5.5" stroke-linecap="round" stroke-linejoin="round"/>
      <path d="M34 4l2 7 6 2-6 2-2 7-2-7-6-2 6-2z" fill="#fff" opacity="0.95"/>
      <line x1="34" y1="19" x2="34" y2="28.5" stroke="#fff" stroke-width="1.8" opacity="0.5"/>
      <circle cx="34" cy="34" r="4.5" fill="#fff" opacity="0.85"/>
    </g>
  </g>

  <!-- wordmark + copy -->
  <g font-family="'Inter','Segoe UI',system-ui,-apple-system,Roboto,sans-serif">
    <text x="252" y="150" font-size="68" font-weight="800" letter-spacing="-2">
      <tspan fill="#FFFFFF">Now</tspan><tspan fill="url(#ai)">AI</tspan><tspan fill="#9EADC4">Kit</tspan>
    </text>
    <text x="255" y="192" font-size="27" font-weight="700" fill="#00D4AA" letter-spacing="0.4">ServiceNow MCP Server</text>
    <text x="255" y="228" font-size="18" font-weight="400" fill="#9EADC4">Connect Claude, ChatGPT, Gemini, Cursor — or any AI — to ServiceNow.</text>

    <!-- value chips -->
    <g font-size="14" font-weight="600">
      <g transform="translate(255 250)">
        <rect width="108" height="30" rx="15" fill="#00D4AA" fill-opacity="0.10" stroke="#00D4AA" stroke-opacity="0.4"/>
        <text x="54" y="20" text-anchor="middle" fill="#33DCBB">450+ tools</text>
      </g>
      <g transform="translate(373 250)">
        <rect width="116" height="30" rx="15" fill="#00D4AA" fill-opacity="0.10" stroke="#00D4AA" stroke-opacity="0.4"/>
        <text x="58" y="20" text-anchor="middle" fill="#33DCBB">31+ modules</text>
      </g>
      <g transform="translate(499 250)">
        <rect width="84" height="30" rx="15" fill="#00D4AA" fill-opacity="0.10" stroke="#00D4AA" stroke-opacity="0.4"/>
        <text x="42" y="20" text-anchor="middle" fill="#33DCBB">Any AI</text>
      </g>
      <g transform="translate(593 250)">
        <rect width="168" height="30" rx="15" fill="#FF8A55" fill-opacity="0.10" stroke="#FF8A55" stroke-opacity="0.4"/>
        <text x="84" y="20" text-anchor="middle" fill="#FF8A55">Read-only by default</text>
      </g>
    </g>
  </g>
</svg>
